{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cs.fullname" . }}-config
  labels:
    {{- include "cs.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.redisPassword }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.secretEncryptionKey }}
  SECRET_ENCRYPTION_KEY: {{ .Values.secrets.secretEncryptionKey | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- if and (not .Values.license.existingSecret) .Values.license.key }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cs.fullname" . }}-license
  labels:
    {{- include "cs.labels" . | nindent 4 }}
type: Opaque
data:
  LICENSE_KEY: {{ .Values.license.key | b64enc | quote }}
{{- end }}

