# Default values for context-retriever.
# This is a YAML-formatted file.

# -- Authentication mode
# For on-prem deployments, set to "local" (API key only, no session auth)
# For cloud deployments, set to "sm" (SM Cloud authentication)
authMode: local
# Admin server configuration
admin:
  # -- Number of replicas
  replicaCount: 1
  # -- Container image
  image:
    repository: redislabs/context-retriever-admin
    tag: "0.4.0"
    pullPolicy: IfNotPresent
  # -- Service configuration
  service:
    type: NodePort
    port: 8080
    nodePort: 30080
  # -- Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 20
  # -- Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
# MCP server configuration.
# The MCP server is always deployed — it is the primary Context Retriever runtime
# (the tool surface agents connect to), so it is not optional.
mcp:
  # -- Public-facing MCP URL surfaced in API responses so clients know where to connect.
  # Set per environment (e.g. https://gcp-us-east4.context-surfaces.redis.io/mcp for prod).
  # Leave empty in environments where the URL should be omitted from responses.
  publicURL: ""
  # -- Number of replicas
  replicaCount: 1
  # -- Container image
  image:
    repository: redislabs/context-retriever
    tag: "0.4.0"
    pullPolicy: IfNotPresent
  # -- Service configuration
  service:
    type: NodePort
    port: 8081
    nodePort: 30081
  # -- Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
# Redis configuration
redis:
  # -- Redis database address (host:port). REQUIRED — bring your own Redis database
  # (most often Redis Enterprise) with the Search + JSON modules (RediSearch + RedisJSON)
  # enabled. There is no default; the chart fails to render if this is not set.
  addr: ""
  # -- Redis ACL username (Redis 6+). Leave empty to authenticate as the server's
  # default user. The password is supplied separately via secrets.redisPassword /
  # secrets.existingSecret (REDIS_PASSWORD).
  username: ""
  # -- Redis database number
  db: 0
  # -- Enable TLS for Redis connection (default: false for on-prem, true for cloud)
  tlsEnabled: false
  # -- Extra CA certificates to trust when connecting to Redis over TLS.
  # Use this when your Redis (e.g. Redis Enterprise) presents a certificate signed by a
  # private/self-signed CA that is not in the public trust store. Each referenced secret's
  # certificate is mounted into the container's system trust path (/etc/ssl/certs) so that
  # go-redis (via Go's default system cert pool) trusts it — no application config needed.
  # The public CA bundle in the image remains trusted; these CAs are added on top.
  #
  # Pass one entry per pre-created secret. The certs are mounted as separate files
  # (/etc/ssl/certs/redis-ca_0.crt, redis-ca_1.crt, ...); the on-disk filename is
  # irrelevant to trust, so it is auto-indexed and you do not choose it. Leave the list
  # empty (the default) to mount nothing — fully backward compatible.
  tlsCA:
    existingSecrets: []
    # - secretName: my-redis-ca         # required: name of a pre-created secret holding the CA cert
    #   key: ca.crt                      # optional: key within that secret (default: ca.crt)
    # - secretName: another-redis-ca     # a second CA, e.g. for a different Redis endpoint
    #   key: tls.crt
# Secrets configuration
secrets:
  # -- Existing secret holding the Context Retriever config. Left empty by default — the
  # operator installing the chart decides whether to reference a pre-created secret (set the
  # name here) or let the chart create one from the inline values below. If set, the secret
  # must contain: REDIS_PASSWORD, SECRET_ENCRYPTION_KEY
  existingSecret: ""
  # -- Redis password (ignored if existingSecret is set)
  redisPassword: ""
  # -- Secret encryption key for encrypting Redis credentials
  # Generate with: openssl rand -base64 32
  # REQUIRED - must be set if existingSecret is not used
  secretEncryptionKey: ""
# License configuration
license:
  # -- Existing secret holding the license. Left empty by default — the operator decides
  # whether to reference a pre-created secret (set the name here) or use the inline key
  # below. If set, the secret must contain a key named LICENSE_KEY
  existingSecret: ""
  # -- License key value (ignored if existingSecret is set)
  # For production deployments, you should use existingSecret instead
  key: ""
# Environment configuration
environment: production
logLevel: info
# Storage backend (redis or memory)
storageBackend: redis
# -- Image pull secrets (for a private/mirror registry, e.g. air-gapped installs)
imagePullSecrets: []
# -- Pod annotations
podAnnotations: {}
# -- Node selector
nodeSelector: {}
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}
# -- Service account configuration
serviceAccount:
  # -- Create a service account
  create: true
  # -- Service account name (generated if not set)
  name: ""
  # -- Annotations for the service account
  annotations: {}
