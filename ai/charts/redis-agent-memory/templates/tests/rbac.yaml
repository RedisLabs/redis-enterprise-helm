{{- /*
Minimal Role + RoleBinding that gives the chart's ServiceAccount just
enough access to read the server Deployment so the `helm test` pod in
security-profile.yaml can verify its env vars.

Scoped to `get` on `deployments` in the release namespace only — deliberately
narrow so clusters that never run `helm test` get no extra RBAC, and even
opted-in clusters cannot list or modify any other resource type. Both
resources are created/deleted by Helm alongside the test pod using the same
hook lifecycle annotations so they live only for the duration of `helm test`
and are cleaned up afterward (see plan "FIPS posture for on-prem Agent Memory",
section: resolving PR #735 comments — helm test RBAC).
*/ -}}
{{- if .Values.tests.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{ include "redis-agent-memory.fullname" . }}-test-reader"
  labels:
    {{- include "redis-agent-memory.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
    resourceNames:
      - "{{ include "redis-agent-memory.fullname" . }}"
      - "{{ include "redis-agent-memory.fullname" . }}-worker"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ include "redis-agent-memory.fullname" . }}-test-reader"
  labels:
    {{- include "redis-agent-memory.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "{{ include "redis-agent-memory.fullname" . }}-test-reader"
subjects:
  - kind: ServiceAccount
    name: {{ include "redis-agent-memory.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
