apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis-agent-memory.fullname" . }}
  labels:
    {{- include "redis-agent-memory.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "redis-agent-memory.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
