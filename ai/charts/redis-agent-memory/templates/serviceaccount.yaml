{{- $createWorkerServiceAccount := or .Values.worker.serviceAccount.create (and .Values.workerAuth.enabled (not .Values.worker.serviceAccount.name)) -}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "redis-agent-memory.serviceAccountName" . }}
  labels:
    {{- include "redis-agent-memory.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
{{- if $createWorkerServiceAccount }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "redis-agent-memory.workerServiceAccountName" . }}
  labels:
    {{- include "redis-agent-memory.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  {{- with .Values.worker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.worker.serviceAccount.automount }}
{{- end }}
