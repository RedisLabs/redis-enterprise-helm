{{- if and .Values.controlplane.enabled (not .Values.controlplane.adminToken.existingSecret) .Values.controlplane.adminToken.autoGenerate }}
{{- /*
  Lookup-or-generate the admin-token Secret. On first install we mint a random
  token; on upgrade we re-read the existing value via `lookup` so the token is
  stable across upgrades and an operator's manual rotation (kubectl edit) is
  never clobbered. BYO deployments set adminToken.existingSecret and this
  template renders nothing.
*/}}
{{- $name := include "redis-agent-memory.controlplaneAdminTokenSecretName" . }}
{{- $key := .Values.controlplane.adminToken.secretKey }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $token := "" }}
{{- if and $existing (index $existing.data $key) }}
{{- $token = index $existing.data $key }}
{{- else }}
{{- $token = randAlphaNum 48 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "redis-agent-memory.labels" . | nindent 4 }}
    app.kubernetes.io/component: controlplane
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{ $key }}: {{ $token }}
{{- end }}
