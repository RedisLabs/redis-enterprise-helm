{{- if .Values.controlplane.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis-agent-memory.controlplaneFullname" . }}
  labels:
    {{- include "redis-agent-memory.labels" . | nindent 4 }}
    app.kubernetes.io/component: controlplane
spec:
  type: {{ .Values.controlplane.service.type }}
  ports:
    - port: {{ .Values.controlplane.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "redis-agent-memory.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controlplane
{{- end }}
