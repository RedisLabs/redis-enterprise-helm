# Default values for redis-agent-memory.

image:
  repository: 'redislabs/agent-memory'
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion stamped at release time.
  # Override at install/upgrade to pin a different RAM image version.
  tag: "0.5.3"

imagePullSecrets: []
# Keep the short chart name stable in labels and notes.
nameOverride: 'redis-agent-memory'
# Default to stable resource names so the shared on-prem config can always call
# the dataplane Service at http://redis-agent-memory:9000.
# This assumes a single release per namespace.
fullnameOverride: 'redis-agent-memory'

airgap:
  # Enables disconnected-environment validation for the deployment artifacts
  # that Helm still controls directly.
  enabled: false

# security.profile selects the application-level security posture for the
# on-prem Agent Memory binary. See the chart README section
# "FIPS-oriented posture" for the full list of guarantees, caveats, and
# required config file changes when profile=fips is selected.
#
# Allowed values:
#   ""     (default) - existing posture, no app-level guardrails applied.
#                      The Go runtime runs with GODEBUG=fips140=off because
#                      the image entrypoint forces that value; this matches
#                      pre-FIPS behavior.
#   "fips"           - opt-in FIPS-oriented posture. The image entrypoint
#                      sets GODEBUG=fips140=on so the Go runtime activates
#                      its FIPS module; the binary additionally refuses to
#                      start if the config sets skip_verify=true on any
#                      outbound HTTP client or if any Redis URL is not
#                      rediss://. This is NOT a formal FIPS compliance
#                      claim; see the README.
#
# This value is propagated to the container as MEM_SECURITY_PROFILE.
security:
  profile: ""

# tests.enabled gates the `helm test` hooks shipped with this chart.
#
# When true, the chart renders:
#   - templates/tests/security-profile.yaml - a Pod that asserts the server
#     Deployment carries the expected MEM_SECURITY_PROFILE env var.
#   - templates/tests/api-smoke.yaml - an optional Pod that calls the public
#     RAM API to verify short-term memory writes, long-term memory writes, and
#     long-term memory search against the configured store.
#   - templates/tests/rbac.yaml - minimal release-managed Role + RoleBinding
#     resources granting the chart ServiceAccount `get` on the two release
#     Deployments, scoped to the release namespace while tests.enabled=true.
#
# Defaults to false so clusters that never run `helm test` get no extra
# RBAC. Enable when you plan to run `helm test <release>` in a validation
# step, e.g. as part of a customer acceptance gate.
tests:
  enabled: false
  smoke:
    # Enable this with tests.enabled=true to run an API smoke test through
    # `helm test`. The smoke test writes one short-term session event, writes
    # one long-term memory record, searches for it, then best-effort deletes
    # the records it created.
    enabled: false
    # Must match a store ID configured in the mounted memory-dataplane config.
    storeId: "00000000000000000000000000000001"
    image:
      repository: python
      tag: "3.13-alpine"
      pullPolicy: IfNotPresent
    # Per HTTP request timeout used by the smoke script.
    timeoutSeconds: 30
    # Maximum runtime for the smoke test pod.
    activeDeadlineSeconds: 180
    # Search is retried to tolerate Redis index visibility delays.
    searchRetries: 6
    searchRetryIntervalSeconds: 5

# Args to pass to the container entrypoint (applied to all pods).
# The chart appends "--mode=server" or "--mode=worker" automatically.
args:
  - "--config"
  - "/etc/ai/memory-dataplane.config.yaml"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''

# Enterprise-safe configuration path:
# provide a pre-created Secret with the shared on-prem config file.
config:
  existingSecret: ""
  secretKey: "memory-dataplane.config.yaml"
  existingSecretChecksum: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: false
  className: 'nginx'
  hosts:
    - host: redis-agent-memory.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  tls: []
  #  - secretName: redis-agent-memory-tls
  #    hosts:
  #      - redis-agent-memory.example.com

livenessProbe:
  httpGet:
    path: /health/liveness
    port: http
readinessProbe:
  httpGet:
    path: /health/readiness
    port: http

# Additional volumes for both server and worker Deployments.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts for both server and worker Deployments.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# TLS certificates for outbound connections (Redis, embedding providers, LLM).
# Mount a CA bundle from a pre-created Secret so the container trusts your
# private Certificate Authority in addition to the built-in system CAs.
tls:
  # Name of a pre-created Secret containing a PEM-encoded CA certificate bundle.
  # Leave empty to just use the default CA bundle shipped in the container image.
  caCertSecret: ""
  # Key inside the Secret that contains the PEM-encoded CA certificate(s).
  caCertKey: "ca.crt"

# Enterprise license file. Provide a customer-specific Secret and reference it
# with license.existingSecret.
license:
  existingSecret: ""
  secretKey: "license"
  mountDir: "/etc/redis-agent-memory"
  fileName: "license"
  existingSecretChecksum: ""

# ---------------------------------------------------------------------------
# Per-component settings
# server.* applies to the API Deployment, worker.* to the background worker.
# ---------------------------------------------------------------------------

server:
  replicaCount: 2
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  nodeSelector: {}
  affinity: {}
  tolerations: []

worker:
  replicaCount: 2
  serviceAccount:
    # Leave disabled to keep using the chart-level serviceAccount. Enable to
    # give worker pods a distinct Kubernetes identity for worker-to-RAM auth.
    create: false
    automount: false
    annotations: {}
    name: ''
    token:
      enabled: false
      audience: redis-agent-memory
      expirationSeconds: 3600
      mountPath: /var/run/secrets/redis-agent-memory-worker
      fileName: token
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  nodeSelector: {}
  affinity: {}
  tolerations: []

# Worker-to-RAM authentication preset. When enabled, the chart gives worker pods
# a Kubernetes projected service-account token suitable for
# dataplane_client.auth.type=service_account_token. By default this also creates
# a dedicated worker ServiceAccount unless worker.serviceAccount.name is set.
#
# Customize the rendered Kubernetes identity and token mount through
# worker.serviceAccount.* above. The shared memory-dataplane config Secret must
# still enable dataplane_client.auth and auth.worker_identity with matching
# issuer/JWKS/audience/subject settings.
workerAuth:
  enabled: false

# ---------------------------------------------------------------------------
# On-prem Control Plane (CP) — the admin store API (/v1/stores, admin-token
# auth) used to create/list/get/update/delete memory stores at runtime.
#
# DISABLED BY DEFAULT. A deployment that only serves memory (server + worker,
# static store config) does not need the CP — leave controlplane.enabled=false
# and no CP resources are rendered. Enable it to provision/manage stores at
# runtime; pair with the data plane's `metadata.source: live` config so the DP
# serves CP-created stores.
#
# The CP runs as its own Deployment + Service (port 9100), reuses the chart's
# license / TLS / serviceAccount / security settings, and mounts its own config
# Secret + a single admin-token Secret.
# ---------------------------------------------------------------------------
controlplane:
  enabled: false

  image:
    # Separate image from the data plane (control-plane binary).
    repository: 'redislabs/agent-memory-control-plane'
    pullPolicy: IfNotPresent
    # Must be set explicitly at install/upgrade time when controlplane.enabled=true.
    tag: "0.5.3"

  replicaCount: 1

  # The CP config file (admin-token source, metadata Redis, store_db, embedding)
  # provided as a pre-created Secret, mounted at /etc/ai. The config's
  # auth.admin_token.token_file must point at the mounted admin-token path
  # (/etc/controlplane-onprem/admin/token) and metadata.namespace is set to
  # iris:memory for on-prem.
  config:
    existingSecret: ""
    secretKey: "controlplane-onprem.config.yaml"
    existingSecretChecksum: ""

  # Admin API token (single value; rotation = edit the Secret, read-on-use picks
  # it up with no redeploy). Precedence: existingSecret (BYO) wins; else
  # autoGenerate lookup-or-generates a Helm-managed Secret on first install
  # (stable across upgrades; never clobbers an operator edit).
  adminToken:
    existingSecret: ""
    secretKey: "token"
    autoGenerate: true
    existingSecretChecksum: ""

  service:
    type: ClusterIP
    port: 9100

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []

  # Additional volumes / volumeMounts for the control-plane Deployment. Use these
  # to mount a Secrets Store CSI (SecretProviderClass) volume so the CP pod keeps
  # a CSI-synced Secret (config / admin token / license) alive — the synced K8s
  # Secret only exists while a pod mounting the CSI volume runs.
  volumes: []
  # - name: secrets-store
  #   csi:
  #     driver: secrets-store.csi.k8s.io
  #     readOnly: true
  #     volumeAttributes:
  #       secretProviderClass: ram-controlplane-spc
  volumeMounts: []
  # - name: secrets-store
  #   mountPath: /mnt/secrets-store
  #   readOnly: true
