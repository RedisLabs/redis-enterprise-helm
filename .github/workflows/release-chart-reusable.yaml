name: Release Helm Chart Reusable

on:
  workflow_call:
    inputs:
      chart_name:
        description: Human-readable chart name for logs and workflow names.
        required: true
        type: string
      chart_path:
        description: Path to the chart directory, for example charts/my-chart.
        required: true
        type: string
      tag_prefix:
        description: Prefix for the git tag, for example my-chart.
        required: true
        type: string
      release_command:
        description: Slash command that triggers the release on a PR comment.
        required: true
        type: string
      pr_number:
        description: Pull request number to release. Used by manual workflow_dispatch testing.
        required: false
        default: ""
        type: string

jobs:
  release:
    permissions:
      contents: write
      pull-requests: read

    runs-on: ubuntu-latest
    outputs:
      chart_version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: Get PR details and check scope
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ inputs.pr_number }}' || context.issue.number);
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            if (pr.data.state !== 'open') {
              core.setFailed('PR is not open. Cannot release.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            const chartPath = '${{ inputs.chart_path }}/';
            const touchesChart = files.some(file => file.filename.startsWith(chartPath));
            const filesOutsideChart = files
              .map(file => file.filename)
              .filter(filename => !filename.startsWith(chartPath));

            if (!touchesChart) {
              core.setFailed(`PR does not modify ${chartPath}. Refusing to release.`);
              return;
            }

            if (filesOutsideChart.length > 0) {
              core.setFailed(
                `PR modifies files outside ${chartPath}: ${filesOutsideChart.join(', ')}. Refusing to release.`
              );
              return;
            }

            core.info(`Release command detected: ${{ inputs.release_command }}`);
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Verify chart exists
        run: |
          test -f "${{ inputs.chart_path }}/Chart.yaml"

      - name: Extract version from Helm chart metadata
        id: extract-version
        run: |
          VERSION=$(grep '^version:' "${{ inputs.chart_path }}/Chart.yaml" | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version for ${{ inputs.chart_name }}: $VERSION"

      - name: Create and push release tag
        run: |
          VERSION="${{ steps.extract-version.outputs.version }}"
          TAG_NAME="${{ inputs.tag_prefix }}-$VERSION"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists locally"
            exit 1
          fi

          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

          echo "Created and pushed tag: $TAG_NAME"

      - name: Prepare isolated chart directory
        run: |
          rm -rf .release-charts
          mkdir -p .release-charts
          cp -R "${{ inputs.chart_path }}" ".release-charts/${{ inputs.tag_prefix }}"

      - name: Write chart releaser config
        run: |
          cat > cr.yaml <<'EOF'
          index-path: .cr-index/ai/index.yaml
          package-path: .cr-release-packages
          pages-index-path: ai/index.yaml
          pages-branch: gh-pages
          release-name-template: '{{ .Name }}-{{ .Version }}'
          EOF

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.9.2

      - name: Install chart releaser
        uses: helm/chart-releaser-action@v1
        with:
          install_only: true
          config: cr.yaml
        env:
          CR_TOKEN: "${{ github.token }}"

      - name: Package chart
        run: |
          cr package ".release-charts/${{ inputs.tag_prefix }}" --config cr.yaml
        env:
          CR_TOKEN: "${{ github.token }}"

      - name: Upload chart release
        run: |
          owner=$(cut -d '/' -f 1 <<< "$GITHUB_REPOSITORY")
          repo=$(cut -d '/' -f 2 <<< "$GITHUB_REPOSITORY")
          cr upload \
            --owner "$owner" \
            --git-repo "$repo" \
            --commit "${{ steps.pr.outputs.head_sha }}" \
            --skip-existing \
            --config cr.yaml
        env:
          CR_TOKEN: "${{ github.token }}"

      - name: Ensure AI Pages directory exists
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT

          git clone --branch gh-pages --depth 1 \
            "https://x-access-token:${CR_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$tmpdir"

          mkdir -p "$tmpdir/ai"
          touch "$tmpdir/ai/.gitkeep"

          if [[ -n "$(git -C "$tmpdir" status --short)" ]]; then
            git -C "$tmpdir" config user.name "$GITHUB_ACTOR"
            git -C "$tmpdir" config user.email "$GITHUB_ACTOR@users.noreply.github.com"
            git -C "$tmpdir" add ai/.gitkeep
            git -C "$tmpdir" commit -m "Initialize AI Helm repository directory"
            git -C "$tmpdir" push origin gh-pages
          fi
        env:
          CR_TOKEN: "${{ github.token }}"

      - name: Update AI Helm repository index
        run: |
          owner=$(cut -d '/' -f 1 <<< "$GITHUB_REPOSITORY")
          repo=$(cut -d '/' -f 2 <<< "$GITHUB_REPOSITORY")
          mkdir -p .cr-index/ai
          cr index \
            --owner "$owner" \
            --git-repo "$repo" \
            --push \
            --config cr.yaml
        env:
          CR_TOKEN: "${{ github.token }}"
