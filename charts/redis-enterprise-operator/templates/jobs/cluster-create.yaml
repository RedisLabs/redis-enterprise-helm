{{- if .Values.cluster.create }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-enterprise-cluster-spec
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis-enterprise
  annotations:
    {{- include "redis-enterprise-operator.annotations" . | nindent 4}}
data:
  cluster.yaml: |
    apiVersion: app.redislabs.com/v1
    kind: RedisEnterpriseCluster
    metadata:
      name: {{ .Values.cluster.name }}
      namespace: {{ .Release.Namespace }}
      labels:
        app: redis-enterprise
    spec:
{{ toYaml .Values.cluster.spec | nindent 6 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-enterprise-cluster-creator
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis-enterprise
  annotations:
    {{- include "redis-enterprise-operator.annotations" . | nindent 4}}
    helm.sh/hook: post-install, post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: redis-enterprise
    spec:
      serviceAccountName: redis-enterprise-operator
      restartPolicy: OnFailure
      containers:
      - name: create-cluster
        image: {{ include "redis-enterprise-operator.operator.image" . }}
        imagePullPolicy: IfNotPresent
        command:
        - install-helper
        args:
        - -action=applyREC
        - -recPath=/cluster-spec/cluster.yaml
        - -namespace={{ .Release.Namespace }}
        - -recName={{ .Values.cluster.name }}
        {{- if .Values.cluster.waitForReady }}
        - -timeout={{ .Values.cluster.timeout }}
        {{- else }}
        - -timeout=0
        {{- end }}
        volumeMounts:
        - name: cluster-spec
          mountPath: /cluster-spec
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: cluster-spec
        configMap:
          name: redis-enterprise-cluster-spec
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: "RuntimeDefault"
{{- end }}

